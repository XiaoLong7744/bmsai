<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F5F2;--bg-sidebar:#F4F3F0;--bg-main:#FDFDFB;--bg-white:#FFFFFF;
  --text-primary:#1A1A1A;--text-secondary:#9E9A94;--text-tertiary:#C4BFB8;
  --border:#EBE8E3;--accent:#E8DFD3;--accent-hover:#DDD3C4;
  --black:#1A1A1A;--radius:14px;--radius-sm:10px;--radius-lg:20px;
  --shadow:0 2px 12px rgba(0,0,0,0.04);--shadow-lg:0 8px 32px rgba(0,0,0,0.06);
  --sidebar-w:260px;--sidebar-collapsed:68px;
  --font:'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}
input,textarea{font-family:inherit;border:none;outline:none;background:none;color:inherit}

/* ===== LAYOUT ===== */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-collapsed);
  background:var(--bg-sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:width .35s cubic-bezier(.4,0,.2,1);
  position:relative;z-index:10;overflow:hidden;flex-shrink:0;
}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar-top{padding:16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo-area{display:flex;align-items:center;gap:10px;overflow:hidden;white-space:nowrap}
.logo-icon{
  width:26px;height:26px;flex-shrink:0;border-radius:6px;overflow:hidden;
  filter:brightness(0);
}
.logo-icon img{width:100%;height:100%;object-fit:contain}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.2px;opacity:1;transition:opacity .25s}
.collapsed .logo-text{opacity:0;pointer-events:none}
.collapse-btn{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .35s;flex-shrink:0;
}
.collapse-btn:hover{background:var(--accent)}
.collapse-btn svg{width:18px;height:18px;color:var(--text-secondary);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.collapsed .collapse-btn svg{transform:rotate(180deg)}

/* New Task Button */
.new-task-btn{
  margin:4px 16px 8px;padding:10px 14px;border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;
  background:#F9F9F9;border:1px solid var(--border);
  transition:all .2s;overflow:hidden;white-space:nowrap;
}
.new-task-btn:hover{background:#ECECEC;border-color:var(--accent-hover);box-shadow:var(--shadow)}
.new-task-btn .icon{font-size:16px;flex-shrink:0;color:var(--text-secondary)}
.collapsed .new-task-btn{justify-content:center;padding:10px}
.collapsed .new-task-btn .btn-label{display:none}

/* Sidebar Nav */
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px}
.nav-section-header{
  padding:8px;display:flex;align-items:center;justify-content:space-between;
  font-size:12px;font-weight:500;color:var(--text-secondary);letter-spacing:.3px;
  cursor:pointer;border-radius:8px;transition:background .2s;
}
.nav-section-header:hover{background:rgba(0,0,0,.03)}
.nav-section-header .chevron{transition:transform .25s;width:16px;height:16px;flex-shrink:0}
.nav-section-header .chevron.open{transform:rotate(180deg)}
.collapsed .nav-section-header span{display:none}
.task-list{transition:max-height .3s ease;overflow-y:visible;overflow-x:hidden}

.task-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border-radius:var(--radius-sm);font-size:13.5px;color:var(--text-primary);
  transition:background .15s;cursor:pointer;white-space:nowrap;position:relative;
}
.task-item:hover{background:rgba(0,0,0,.04)}
.task-item.active{background:var(--accent);font-weight:500}
.task-item.active:hover{background:var(--accent-hover)}
.task-item.active .task-icon{color:var(--text-primary)}
.task-item.active .task-more-btn{opacity:1}
.task-item .task-icon{width:20px;height:20px;flex-shrink:0;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
.task-item .task-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.task-item .task-more-btn{
  width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);flex-shrink:0;opacity:0;transition:all .15s;position:relative;
}
.task-item:hover .task-more-btn{opacity:1}
.task-item .task-more-btn:hover{background:rgba(0,0,0,.08);color:var(--text-primary)}
.task-item .task-more-btn svg{width:16px;height:16px}
/* Task context menu */
.task-context-menu{
  position:fixed;z-index:200;
  background:var(--bg-white);border:1px solid var(--border);
  border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.1);
  min-width:120px;overflow:hidden;
  animation:dropIn .15s cubic-bezier(.4,0,.2,1);
}
.task-context-item{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  font-size:13px;color:var(--text-primary);cursor:pointer;transition:background .15s;white-space:nowrap;
}
.task-context-item:hover{background:rgba(0,0,0,.04)}
.task-context-item svg{width:15px;height:15px;color:var(--text-secondary);flex-shrink:0}
.task-context-item.danger{color:#D4534A}
.task-context-item.danger svg{color:#D4534A}
.task-context-item+.task-context-item{border-top:1px solid #F0EEEA}
.collapsed .task-item .task-label{display:none}

/* Sidebar Bottom */
.sidebar-bottom{
  padding:12px 16px;
}
.bms-icon-wrapper{position:relative;display:inline-flex}
.bms-icon-btn{
  width:38px;height:38px;border-radius:8px;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--text-secondary);
  font-size:10px;font-weight:700;letter-spacing:-.3px;
}
.bms-icon-btn:hover{background:rgba(0,0,0,.06);color:var(--text-primary)}
.bms-icon-btn svg{width:18px;height:18px}
.bms-tooltip{
  position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);
  background:var(--black);color:#fff;font-size:12px;font-weight:500;
  padding:6px 12px;border-radius:8px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  transform:translateX(-50%) translateY(4px);
}
.bms-tooltip::after{
  content:'';position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:var(--black);border-bottom:0;
}
.bms-icon-wrapper:hover .bms-tooltip{opacity:1;transform:translateX(-50%) translateY(0)}
.collapsed .sidebar-bottom{display:flex;justify-content:center;padding:12px 0}

/* ===== MAIN CONTENT ===== */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg-main)}

/* Top Bar */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;position:relative;z-index:20;
}
.top-bar-title{
  font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:-.2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.avatar-wrapper{position:relative;margin-left:auto}
.avatar-btn{
  width:38px;height:38px;border-radius:50%;overflow:hidden;
  background:#EAF2FB;border:1px solid #DDE8F3;
  display:flex;align-items:center;justify-content:center;
  transition:box-shadow .2s,transform .15s;
}
.avatar-btn:hover{box-shadow:0 0 0 3px rgba(180,210,240,.35);transform:scale(1.04)}
.avatar-btn svg{width:22px;height:22px;color:#6AAFEF;opacity:1}

/* Dropdown */
.avatar-dropdown{
  position:absolute;right:0;top:calc(100% + 8px);
  background:var(--bg-white);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  min-width:200px;overflow:hidden;
  transform-origin:top right;
  animation:dropIn .2s cubic-bezier(.4,0,.2,1);
}
@keyframes dropIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dropdown-header{padding:16px;border-bottom:1px solid var(--border)}
.dropdown-name{font-size:14px;font-weight:600}
.dropdown-role{font-size:12px;color:var(--text-secondary);margin-top:2px}
.dropdown-item{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  font-size:13.5px;color:var(--text-secondary);transition:all .15s;
  cursor:pointer;
}
.dropdown-item:hover{background:rgba(0,0,0,.03);color:var(--text-primary)}
.dropdown-item svg{width:16px;height:16px}

/* Center Welcome */
.center-stage{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:0 28px 120px;
  max-width:820px;width:100%;margin:0 auto;
}
.greeting{text-align:left;width:100%;margin-bottom:48px}
.greeting-name{
  font-size:clamp(30px,4.2vw,42px);font-weight:700;
  color:var(--text-primary);line-height:1.35;letter-spacing:-.5px;
}
.greeting-sub{
  font-size:clamp(26px,3.8vw,38px);font-weight:700;
  color:#BEB5A8;line-height:1.35;margin-top:6px;letter-spacing:-.3px;
}

/* Input Area */
.input-area{
  width:100%;background:var(--bg-white);
  border:1px solid #ECEAE6;border-radius:18px;
  box-shadow:0 1px 8px rgba(0,0,0,0.03);transition:border-color .2s,box-shadow .2s;
  position:relative;
}
.input-area:focus-within{border-color:#DDD9D3;box-shadow:0 4px 20px rgba(0,0,0,0.05)}
.input-field{
  width:100%;min-height:100px;max-height:180px;padding:22px 22px 56px 22px;
  font-size:15px;line-height:1.7;resize:none;
  color:var(--text-primary);background:transparent;
}
.input-field::placeholder{color:#C8C3BB}
.attach-wrapper{position:absolute;left:14px;bottom:14px;display:flex;align-items:center;gap:4px}
.attach-btn{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);transition:all .15s;background:transparent;
}
.attach-btn:hover{background:rgba(0,0,0,.05);color:var(--text-primary)}
.attach-btn svg{width:18px;height:18px}
.attach-menu{
  position:absolute;left:0;bottom:calc(100% + 8px);
  background:var(--bg-white);border:1px solid #ECEAE6;
  border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,0.08);
  min-width:160px;overflow:hidden;
  animation:dropIn .2s cubic-bezier(.4,0,.2,1);
}
.attach-menu-item{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  font-size:13.5px;color:var(--text-primary);cursor:pointer;transition:background .15s;
}
.attach-menu-item:hover{background:rgba(0,0,0,.03)}
.attach-menu-item svg{width:18px;height:18px;color:var(--text-secondary);flex-shrink:0}
.attach-menu-item+.attach-menu-item{border-top:1px solid #F0EEEA}
.send-btn{
  position:absolute;right:16px;bottom:16px;
  width:38px;height:38px;border-radius:50%;
  background:#6B6560;color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,opacity .15s,background .15s;opacity:.45;
}
.send-btn.active{opacity:1;background:#4A4540}
.send-btn.active:hover{transform:scale(1.08)}
.send-btn svg{width:18px;height:18px}

/* Overlay for dropdown */
.overlay{position:fixed;inset:0;z-index:15}

/* Task View (right side when task selected) */
.task-view{
  flex:1;display:flex;flex-direction:column;
  max-width:820px;width:100%;margin:0 auto;padding:0 28px;overflow-y:auto;
}
.task-view-header{
  padding:8px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;
}
.task-view-title{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px}
.task-view-meta{font-size:13px;color:var(--text-secondary);margin-top:6px}
.task-view-body{flex:1;display:flex;flex-direction:column;gap:24px;padding:0 0 24px;overflow-y:auto}
.task-view-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--text-tertiary);font-size:15px;
}
/* Chat Messages */
.chat-msg{display:flex;gap:12px;max-width:100%}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.chat-avatar img{width:100%;height:100%;object-fit:contain;filter:brightness(0)}
.chat-avatar.user-avatar{background:#EAF2FB;border:1px solid #DDE8F3}
.chat-avatar.user-avatar svg{width:18px;height:18px;color:#6AAFEF}
.chat-bubble{
  max-width:72%;padding:12px 16px;font-size:14px;line-height:1.7;
  border-radius:16px;word-break:break-word;
}
.chat-msg.assistant .chat-bubble{
  background:var(--bg-white);border:1px solid #ECEAE6;color:var(--text-primary);
  border-top-left-radius:4px;
}
.chat-msg.user .chat-bubble{
  background:#4A4540;color:#fff;
  border-top-right-radius:4px;
}
.chat-actions{
  display:flex;align-items:center;gap:4px;margin-top:6px;
}
.chat-msg.user .chat-actions{justify-content:flex-end}
.chat-action-btn{
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  color:var(--text-tertiary);transition:all .15s;cursor:pointer;
}
.chat-action-btn:hover{background:rgba(0,0,0,.05);color:var(--text-secondary)}
.chat-action-btn svg{width:14px;height:14px}
.typing-indicator{display:flex;gap:4px;padding:4px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);animation:typingBounce .6s infinite alternate}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{from{opacity:.3;transform:translateY(0)}to{opacity:1;transform:translateY(-4px)}}

/* ===== ANIMATIONS ===== */
.fade-enter-active,.fade-leave-active{transition:opacity .15s}
.fade-enter-from,.fade-leave-to{opacity:0}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.greeting-name{animation:slideUp .5s cubic-bezier(.4,0,.2,1) both}
.greeting-sub{animation:slideUp .5s .08s cubic-bezier(.4,0,.2,1) both}
.input-area{animation:slideUp .5s .16s cubic-bezier(.4,0,.2,1) both}

/* Scrollbar */
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sidebar-nav::-webkit-scrollbar-track{background:transparent}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;
    box-shadow:var(--shadow-lg);transform:translateX(-100%);transition:transform .3s}
  .sidebar:not(.collapsed){transform:translateX(0)}
}
</style>
</head>
<body>
<div id="app">
  <!-- Vue Template -->
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" :class="{collapsed: sidebarCollapsed}">
      <div class="sidebar-top">
        <div class="logo-area">
          <div class="logo-icon"><img src="logo.png" alt="logo"></div>
          <span class="logo-text">BMS协作助手</span>
        </div>
        <button class="collapse-btn" @click="sidebarCollapsed=!sidebarCollapsed" title="收起侧栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="15 9 12 12 15 15"/></svg>
        </button>
      </div>

      <button class="new-task-btn" @click="createNewTask">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
        </span>
        <span class="btn-label">新建任务</span>
      </button>

      <nav class="sidebar-nav">
        <div class="nav-section-header" @click="taskListOpen=!taskListOpen">
          <span>你的任务</span>
          <svg class="chevron" :class="{open:taskListOpen}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="task-list" :style="{maxHeight: taskListOpen ? '400px' : '0px'}">
          <div class="task-item" v-for="task in tasks" :key="task.id"
               :class="{active: activeTaskId===task.id}"
               @click="selectTask(task)">
            <span class="task-icon">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M7 10l2 2 4-4"/></svg>
            </span>
            <span class="task-label">{{ task.name }}</span>
            <span class="task-more-btn" @click.stop="toggleTaskMenu(task.id,$event)">
              <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
            </span>
          </div>
        </div>
        <!-- Task context menu (fixed position, outside overflow) -->
        <Teleport to="body">
          <div v-if="taskMenuOpenId!==null" class="task-context-menu" :style="taskMenuStyle">
            <div class="task-context-item" @click.stop="pinTask(getTaskById(taskMenuOpenId))">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V6h1a2 2 0 000-4H8a2 2 0 000 4h1v4.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24z"/></svg>
              置顶
            </div>
            <div class="task-context-item danger" @click.stop="deleteTask(getTaskById(taskMenuOpenId))">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              删除
            </div>
          </div>
        </Teleport>
      </nav>

      <div class="sidebar-bottom">
        <div class="bms-icon-wrapper">
          <a href="http://test-bms.k7.cn/" target="_blank" rel="noopener" class="bms-icon-btn">BMS</a>
          <div class="bms-tooltip">BMS后台</div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="top-bar">
        <div v-if="activeTask" class="top-bar-title">{{ activeTask.name }}</div>
        <div class="avatar-wrapper">
          <button class="avatar-btn" @click.stop="dropdownOpen=!dropdownOpen">
            <svg viewBox="0 0 16 16" fill="#6AAFEF" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="2" width="6" height="2"/><rect x="4" y="4" width="2" height="2"/><rect x="10" y="4" width="2" height="2"/><rect x="4" y="6" width="8" height="2"/><rect x="6" y="4" width="1" height="2"/><rect x="9" y="4" width="1" height="2"/><rect x="3" y="8" width="10" height="2"/><rect x="5" y="10" width="2" height="2"/><rect x="9" y="10" width="2" height="2"/><rect x="5" y="12" width="2" height="2"/><rect x="9" y="12" width="2" height="2"/></svg>
          </button>
          <div v-if="dropdownOpen" class="avatar-dropdown">
            <div class="dropdown-header">
              <div class="dropdown-name">{{ userName }}</div>
              <div class="dropdown-role">shimingxu</div>
            </div>
            <div class="dropdown-item" @click="logout">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              退出登录
            </div>
          </div>
        </div>
      </div>

      <!-- Click overlay to close dropdown -->
      <div v-if="dropdownOpen" class="overlay" @click="dropdownOpen=false;attachMenuOpen=false"></div>

      <div v-if="!activeTask" class="center-stage">
        <div class="greeting">
          <div class="greeting-name">你好，{{ userName }}</div>
          <div class="greeting-sub">{{ greetingText }}，有什么可以帮您的吗？</div>
        </div>

        <div class="input-area">
          <textarea
            ref="inputRef"
            class="input-field"
            v-model="message"
            :placeholder="'请输入您的问题...'"
            rows="1"
            @input="autoResize"
            @keydown.enter.exact.prevent="sendMessage"
          ></textarea>
          <div class="attach-wrapper">
            <button class="attach-btn" @click.stop="attachMenuOpen=!attachMenuOpen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <div v-if="attachMenuOpen" class="attach-menu">
              <div class="attach-menu-item" @click="uploadFile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                添加文件
              </div>
              <div class="attach-menu-item" @click="uploadImage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                添加照片
              </div>
            </div>
          </div>
          <input type="file" ref="fileInputRef" style="display:none" @change="onFileSelected">
          <input type="file" ref="imageInputRef" accept="image/*" style="display:none" @change="onImageSelected">
          <button class="send-btn" :class="{active: message.trim()}" @click="sendMessage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Task detail view -->
      <div v-else class="task-view">
        <div class="task-view-body" ref="chatBodyRef">
          <div v-if="!currentMessages.length" class="task-view-empty">暂无对话内容，请在下方输入开始交流</div>
          <template v-for="(msg,i) in currentMessages" :key="i">
            <div class="chat-msg" :class="msg.role">
              <div v-if="msg.role==='assistant'" class="chat-avatar">
                <img src="logo.png" alt="AI">
              </div>
              <div v-else class="chat-avatar user-avatar">
                <svg viewBox="0 0 16 16" fill="#6AAFEF" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="2" width="6" height="2"/><rect x="4" y="4" width="2" height="2"/><rect x="10" y="4" width="2" height="2"/><rect x="4" y="6" width="8" height="2"/><rect x="6" y="4" width="1" height="2"/><rect x="9" y="4" width="1" height="2"/><rect x="3" y="8" width="10" height="2"/><rect x="5" y="10" width="2" height="2"/><rect x="9" y="10" width="2" height="2"/><rect x="5" y="12" width="2" height="2"/><rect x="9" y="12" width="2" height="2"/></svg>
              </div>
              <div>
                <div class="chat-bubble" v-html="msg.content"></div>
                <div v-if="msg.role==='assistant'" class="chat-actions">
                  <span class="chat-action-btn" title="复制">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                  </span>
                  <span class="chat-action-btn" title="点赞">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
                  </span>
                </div>
              </div>
            </div>
          </template>
          <div v-if="isTyping" class="chat-msg assistant">
            <div class="chat-avatar"><img src="logo.png" alt="AI"></div>
            <div class="chat-bubble">
              <div class="typing-indicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="input-area" style="margin-bottom:28px;flex-shrink:0">
          <textarea
            class="input-field"
            v-model="message"
            :placeholder="'在「' + activeTask.name + '」中提问...'"
            rows="1"
            @input="autoResize"
            @keydown.enter.exact.prevent="sendMessage"
            style="min-height:60px"
          ></textarea>
          <div class="attach-wrapper">
            <button class="attach-btn" @click.stop="attachMenuOpen=!attachMenuOpen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
          </div>
          <button class="send-btn" :class="{active: message.trim()}" @click="sendMessage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
const{createApp,ref,computed,onMounted,nextTick,reactive}=Vue;
createApp({
  setup(){
    const sidebarCollapsed=ref(false);
    const taskListOpen=ref(true);
    const dropdownOpen=ref(false);
    const attachMenuOpen=ref(false);
    const message=ref('');
    const inputRef=ref(null);
    const fileInputRef=ref(null);
    const imageInputRef=ref(null);
    const chatBodyRef=ref(null);
    const userName=ref('时明旭');
    const activeTaskId=ref(null);
    const taskMenuOpenId=ref(null);
    const taskMenuStyle=ref({});
    const isTyping=ref(false);
    const chatHistory=reactive({
      1:[
        {role:'user',content:'帮我自动生成上个月的销售数据报表，按区域和产品类别分类。'},
        {role:'assistant',content:'好的，我已获取到上月的销售数据。正在按区域和产品类别进行汇总分析，报表将包含以下内容：<br>1. 各区域销售额对比<br>2. 产品类别占比分析<br>3. 环比增长趋势<br>4. TOP10 热销产品'},
        {role:'user',content:'能不能加上同比去年的数据对比？'},
        {role:'assistant',content:'当然可以。我已加入同比对比模块，报表新增了以下字段：<br>• 去年同期销售额<br>• 同比增长率（%）<br>• 各区域同比变化趋势图<br><br>报表已生成完毕，您可以点击右上角导出为 Excel 或 PDF 格式。'},
      ],
      2:[
        {role:'user',content:'最近用户反馈量比较大，帮我做一下分类整理和情感分析。'},
        {role:'assistant',content:'收到，我已从反馈系统中提取了最近 7 天共 1,283 条用户反馈。初步分类结果如下：<br>• 功能建议：34%<br>• Bug 报告：28%<br>• 使用体验：22%<br>• 其他：16%<br><br>情感分布：正面 41%，中性 32%，负面 27%'},
        {role:'user',content:'负面反馈主要集中在哪些方面？'},
        {role:'assistant',content:'负面反馈 TOP3 问题集中在：<br>1. <b>页面加载速度慢</b> — 占比 38%，主要出现在移动端<br>2. <b>搜索结果不精准</b> — 占比 29%，用户反映关键词匹配度低<br>3. <b>支付流程复杂</b> — 占比 18%，多步骤导致放弃率较高<br><br>建议优先处理页面性能和搜索算法优化。需要我生成详细报告吗？'},
        {role:'user',content:'好的，生成一份详细报告发给产品团队。'},
        {role:'assistant',content:'已生成《用户反馈分析报告 — 2026年3月》，包含数据概览、分类详情、情感分析、重点问题及改进建议五个章节。报告已发送至产品团队邮件组，请查收确认。'},
      ],
      3:[
        {role:'user',content:'检查一下最近三天的系统日志，看有没有异常错误。'},
        {role:'assistant',content:'已完成近 3 天系统日志扫描，共分析 247,615 条日志记录。检测到以下异常：<br>• <b>ERROR 级别</b>：共 83 条<br>• <b>WARN 级别</b>：共 214 条<br><br>主要错误集中在数据库连接超时（42 次）和 API 响应 500 错误（31 次），均出现在凌晨 2:00-4:00 的批处理时段。'},
        {role:'user',content:'数据库连接超时的原因是什么？'},
        {role:'assistant',content:'经排查，数据库连接超时的主要原因有两个：<br>1. <b>连接池配置不足</b> — 当前最大连接数为 50，批处理高峰期并发请求达到 80+，导致排队超时<br>2. <b>慢查询阻塞</b> — 发现 3 条未优化的 SQL 查询，平均执行时间超过 15 秒<br><br>建议：将连接池上限调整为 120，并对慢查询添加索引优化。需要我生成具体的优化方案吗？'},
      ],
    });

    const currentMessages=computed(()=>{
      if(!activeTaskId.value)return[];
      return chatHistory[activeTaskId.value]||[];
    });

    const activeTask=computed(()=>{
      if(!activeTaskId.value)return null;
      return tasks.value.find(t=>t.id===activeTaskId.value)||null;
    });
    function getTaskById(id){return tasks.value.find(t=>t.id===id)||null}

    const tasks=ref([
      {id:1,name:'数据报表自动生成'},
      {id:2,name:'用户反馈分析任务'},
      {id:3,name:'系统日志检查'}
    ]);

    const greetingText=computed(()=>{
      const h=new Date().getHours();
      if(h<6)return'夜深了';
      if(h<12)return'早上好';
      if(h<14)return'中午好';
      if(h<18)return'下午好';
      return'晚上好';
    });

    function autoResize(){
      const el=inputRef.value;
      if(!el)return;
      el.style.height='auto';
      el.style.height=Math.min(el.scrollHeight,160)+'px';
    }
    function scrollToBottom(){
      nextTick(()=>{
        const el=chatBodyRef.value;
        if(el)el.scrollTop=el.scrollHeight;
      });
    }
    const mockReplies=[
      '好的，我已收到您的请求。让我来分析一下相关数据，稍后为您生成报告。',
      '正在处理中，我会根据您的需求整理相关信息，请稍等片刻。',
      '收到！我将从以下几个维度进行分析：<br>1. 数据概览<br>2. 趋势变化<br>3. 异常检测<br>4. 优化建议',
      '已为您完成初步分析。如需更详细的数据或其他角度的分析，请告诉我。',
      '这是一个很好的问题。根据现有数据，我建议从用户行为和系统性能两方面入手进行优化。',
    ];
    function sendMessage(){
      if(!message.value.trim())return;
      let tid=activeTaskId.value;
      if(!tid){
        tid=Date.now();
        const name=message.value.trim().length>20?message.value.trim().slice(0,20)+'...':message.value.trim();
        tasks.value.unshift({id:tid,name:name});
        activeTaskId.value=tid;
      }
      if(!chatHistory[tid])chatHistory[tid]=[];
      chatHistory[tid].push({role:'user',content:message.value.trim()});
      message.value='';
      nextTick(autoResize);
      scrollToBottom();
      isTyping.value=true;
      scrollToBottom();
      setTimeout(()=>{
        isTyping.value=false;
        const reply=mockReplies[Math.floor(Math.random()*mockReplies.length)];
        chatHistory[tid].push({role:'assistant',content:reply});
        scrollToBottom();
      },800+Math.random()*1200);
    }
    function createNewTask(){
      activeTaskId.value=null;
      taskMenuOpenId.value=null;
      message.value='';
    }
    function selectTask(task){
      activeTaskId.value=task.id;
      taskMenuOpenId.value=null;
      console.log('选择任务:',task.name);
    }
    function toggleTaskMenu(id,e){
      e.stopPropagation();
      if(taskMenuOpenId.value===id){taskMenuOpenId.value=null;return}
      const rect=e.currentTarget.getBoundingClientRect();
      taskMenuStyle.value={top:rect.bottom+4+'px',left:rect.right-120+'px'};
      taskMenuOpenId.value=id;
    }
    function pinTask(task){
      taskMenuOpenId.value=null;
      const idx=tasks.value.findIndex(t=>t.id===task.id);
      if(idx>0){
        tasks.value.splice(idx,1);
        tasks.value.unshift(task);
      }
    }
    function deleteTask(task){
      taskMenuOpenId.value=null;
      const idx=tasks.value.findIndex(t=>t.id===task.id);
      if(idx>-1){
        tasks.value.splice(idx,1);
        if(activeTaskId.value===task.id){
          activeTaskId.value=tasks.value.length?tasks.value[0].id:null;
        }
      }
    }
    function logout(){
      dropdownOpen.value=false;
      console.log('退出登录');
      alert('已退出登录');
    }
    function uploadFile(){attachMenuOpen.value=false;fileInputRef.value&&fileInputRef.value.click()}
    function uploadImage(){attachMenuOpen.value=false;imageInputRef.value&&imageInputRef.value.click()}
    function onFileSelected(e){const f=e.target.files;if(f&&f.length)console.log('选择文件:',f[0].name);e.target.value=''}
    function onImageSelected(e){const f=e.target.files;if(f&&f.length)console.log('选择图片:',f[0].name);e.target.value=''}
    onMounted(()=>{
      inputRef.value&&inputRef.value.focus();
      document.addEventListener('click',()=>{attachMenuOpen.value=false;taskMenuOpenId.value=null});
    });
    return{sidebarCollapsed,taskListOpen,dropdownOpen,attachMenuOpen,message,inputRef,fileInputRef,imageInputRef,chatBodyRef,userName,tasks,activeTaskId,activeTask,taskMenuOpenId,taskMenuStyle,isTyping,currentMessages,greetingText,autoResize,sendMessage,scrollToBottom,createNewTask,selectTask,toggleTaskMenu,getTaskById,pinTask,deleteTask,logout,uploadFile,uploadImage,onFileSelected,onImageSelected};
  }
}).mount('#app');
</script>

</body>
</html>
